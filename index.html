<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TS Code</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1NKF2PBsyNdpEcutEiAZgbE6xie_0T0UFnA&s" sizes="16×16" type="image/png" /> 
    <style>
        body {
            margin: 0;
            font-family: monospace;
            background: #1e1e1e;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #toolbar {
            background: #252526;
            padding: 6px;
            display: flex;
            gap: 6px;
        }

        button {
            background: #444;
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
        }

        #editor {
            flex: 1;
            display: flex;
        }

        #lines {
            width: 40px;
            padding: 10px;
            color: #888;
            text-align: right;
        }

        textarea {
            flex: 1;
            background: #1e1e1e;
            color: white;
            border: none;
            outline: none;
            font-family: monospace;
            padding: 10px;
        }

        /* bottom */
        #bottom {
            height: 220px;
            background: #111;
            display: flex;
            flex-direction: column;
        }

        #console {
            flex: 1;
            overflow: auto;
            padding: 6px;
            border-bottom: 1px solid #333;
        }

        #terminal {
            background: #000;
            color: #0f0;
            border: none;
            outline: none;
            padding: 6px;
            font-family: monospace;
        }

        /* debugger */
        #debugPanel {
            height: 80px;
            background: #202020;
            padding: 6px;
            overflow: auto;
        }

        #tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tab {
            padding: 5px 10px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .tab button {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            margin-left: 5px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div id="toolbar">
    <button onclick="run()">▶ Run</button>
    <button onclick="startDebug()">Debug</button>
    <button onclick="step()">Step</button>
    <button onclick="newFile()">New File</button>
    <button onclick="saveFile()">Save File</button>
    <button onclick="loadFile()">Load File</button>
    <button onclick="showFileList()">Files</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<div id="tabs"></div> <!-- タブ表示用のエリア -->

<div id="editor">
    <div id="lines"></div>
    <textarea id="code"></textarea>
</div>

<div id="bottom">
    <div id="console"></div>
    <div id="debugPanel">Variables:</div>
    <input id="terminal" placeholder="terminal command">
</div>
<!-- ファイル一覧モーダル -->
<div id="fileListModal" style="
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:#222;
    color:white;
    padding:20px;
    border:1px solid #555;
    z-index:1000;
    max-height:60%;
    overflow:auto;
">
    <h3>Saved Files</h3>
    <div id="fileListContent"></div>
    <button onclick="closeFileListModal()" style="margin-top:10px;">Close</button>
</div>

<!-- モーダル背景 -->
<div id="modalOverlay" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:999;
"></div>
<script>
    const code = document.getElementById("code");
    const lines = document.getElementById("lines");
    const consolePanel = document.getElementById("console");
    const debugPanel = document.getElementById("debugPanel");
    const terminal = document.getElementById("terminal");

    let openFiles = {};
    let debugLines = [];
    let debugIndex = 0;
    let vars = {};
    let isDarkMode = true;

    // 行番号の更新
    function updateLines() {
        let count = code.value.split("\n").length;
        let html = "";
        for (let i = 1; i <= count; i++) {
            html += i + "<br>";
        }
        lines.innerHTML = html;
    }

    code.addEventListener("input", updateLines);
    updateLines();

    // コンソールログ
    function log(msg) {
        consolePanel.innerHTML += msg + "<br>";
        consolePanel.scrollTop = consolePanel.scrollHeight;
    }
    console.log = (msg) => log(msg);

    // 実行
    function run() {
        consolePanel.innerHTML = "";
        try {
            eval(code.value);
        } catch (e) {
            log("Error: " + e.message);
        }
    }

    // デバッグ
    function startDebug() {
        consolePanel.innerHTML = "";
        debugLines = code.value.split("\n");
        debugIndex = 0;
        vars = {};
        debugPanel.innerHTML = "Variables:";
    }

    function step() {
        if (debugIndex >= debugLines.length) return;
        let line = debugLines[debugIndex];
        try {
            eval(line);
        } catch (e) {
            log("Error line " + (debugIndex + 1) + ": " + e.message);
        }
        debugIndex++;
        updateVars();
    }

    function updateVars() {
        let html = "Variables:<br>";
        for (let k in vars) {
            html += k + " = " + vars[k] + "<br>";
        }
        debugPanel.innerHTML = html;
    }

    function loadFileFromList(filename) {
    const content = localStorage.getItem(filename);
    if (content !== null) {
        openFile(filename, content); // タブも作成される
        log(`File ${filename} loaded from list.`);
    } else {
        log(`File ${filename} not found.`);
    }
}

    // ファイル操作
    function saveFile() {
        const filename = prompt("Enter filename to save as:");
        if (filename) {
            localStorage.setItem(filename, code.value);
            log(`File saved as ${filename}`);
        }
    }

    function loadFile() {
    const filename = prompt("Enter filename to load:");
    const fileContent = localStorage.getItem(filename);
    if (fileContent) {
        code.value = fileContent;
        updateLines();
        log(`File ${filename} loaded.`);

        // ファイルを開く（タブを作成）
        openFile(filename, fileContent); // ロードしたファイルを開く
    } else {
        log(`File ${filename} not found.`);
    }
}

    function newFile() {
    code.value = ''; // エディタを空にする
    updateLines();
    log("New file created.");

    // 新しいファイルを開く
    openFile('newfile.js', ''); // 新しいファイルを作成し、タブを追加
}

    // マルチタブ機能
    // マルチタブ機能
function newFileTab(filename) {
    const tab = document.createElement("div");
    tab.className = 'tab';
    tab.innerHTML = `${filename} <button onclick="closeTab('${filename}')">×</button>`;
    tab.onclick = () => loadFileTab(filename);  // タブをクリックしたときにファイルを読み込む
    document.getElementById("tabs").appendChild(tab);  // タブを#tabsに追加
}

// ファイルを閉じるときも更新
function closeTab(filename) {
    delete openFiles[filename];
    localStorage.setItem("openFiles", JSON.stringify(openFiles)); // 更新
    const tabs = document.getElementById("tabs").children;
    for (let tab of tabs) {
        if (tab.innerText.includes(filename)) {
            tab.remove();
            break;
        }
    }
    if (Object.keys(openFiles).length > 0) {
        loadFileTab(Object.keys(openFiles)[0]);
    } else {
        code.value = '';
        updateLines();
    }
    log(`File ${filename} closed.`);
}

// ファイルを切り替える
function loadFileTab(filename) {
    const fileContent = openFiles[filename] || '';
    code.value = fileContent;  // エディタにファイル内容を表示
    updateLines();  // 行番号の更新
    log(`Switched to ${filename}`);
}
// ファイル一覧モーダルを開く
function showFileList() {
    const container = document.getElementById("fileListContent");
    container.innerHTML = "";

    // 保存されたファイル一覧を取得
    const savedFiles = JSON.parse(localStorage.getItem("openFiles") || "{}");

    // openFiles の中身を表示
    for (let filename in savedFiles) {
        const fileDiv = document.createElement("div");
        fileDiv.style.display = "flex";
        fileDiv.style.justifyContent = "space-between";
        fileDiv.style.marginBottom = "5px";

        const nameSpan = document.createElement("span");
        nameSpan.textContent = filename;
        nameSpan.style.cursor = "pointer";
        nameSpan.style.color = "#0af";
        nameSpan.onclick = () => {
            const content = savedFiles[filename];
            openFile(filename, content);  // タブを開く
            closeFileListModal();  // モーダルを閉じる
            log(`File ${filename} opened from list.`);
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "×";
        deleteBtn.style.background = "red";
        deleteBtn.style.color = "white";
        deleteBtn.style.border = "none";
        deleteBtn.style.cursor = "pointer";
        deleteBtn.onclick = () => {
            if (confirm(`Delete file ${filename}?`)) {
                delete savedFiles[filename];
                localStorage.setItem("openFiles", JSON.stringify(savedFiles));  // 更新
                fileDiv.remove();
                log(`File ${filename} deleted.`);
            }
        };

        fileDiv.appendChild(nameSpan);
        fileDiv.appendChild(deleteBtn);
        container.appendChild(fileDiv);
    }

    document.getElementById("fileListModal").style.display = "block";
    document.getElementById("modalOverlay").style.display = "block";
}

function closeFileListModal() {
    document.getElementById("fileListModal").style.display = "none";
    document.getElementById("modalOverlay").style.display = "none";
}

function closeFileListModal() {
    document.getElementById("fileListModal").style.display = "none";
    document.getElementById("modalOverlay").style.display = "none";
}
// ファイルを開くときにlocalStorageにも保存
function openFile(filename, content) {
    openFiles[filename] = content;
    localStorage.setItem("openFiles", JSON.stringify(openFiles)); // 保存
    newFileTab(filename);
    loadFileTab(filename);
}

    // テーマ変更
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.style.backgroundColor = isDarkMode ? '#1e1e1e' : '#fff';
        document.body.style.color = isDarkMode ? 'white' : 'black';
        document.getElementById("toolbar").style.backgroundColor = isDarkMode ? '#252526' : '#ddd';
    }

    // 自動補完
    function showAutocomplete(e) {
        const input = code.value.substring(0, e.target.selectionStart);
        const lastWord = input.split(/\s+/).pop();
        const matches = suggestions.filter(word => word.startsWith(lastWord));
        console.log(matches);
    }

    code.addEventListener('input', showAutocomplete);

    // ターミナル処理
    terminal.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            let cmd = terminal.value;
            log("> " + cmd);
            if (cmd === "help") {
                log("commands: help clear date echo");
            } else if (cmd === "clear") {
                consolePanel.innerHTML = "";
            } else if (cmd.startsWith("echo ")) {
                log(cmd.substring(5));
            } else if (cmd === "date") {
                log(new Date());
            } else {
                log("command not found");
            }
            terminal.value = "";
        }
    });
// ページ読み込み時に前回開いていたタブを復元
window.addEventListener("load", () => {
    const lastOpen = JSON.parse(localStorage.getItem("openFiles") || "{}");
    for (let filename in lastOpen) {
        openFile(filename, lastOpen[filename]);
    }
});
    openFile('newfile.js', '');
</script>

</body>
</html>
